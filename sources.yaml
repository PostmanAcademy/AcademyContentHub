# ═══════════════════════════════════════════════════════════════
# Training Content Sync — Data Sources Registry
# ═══════════════════════════════════════════════════════════════
#
# This file is the single config that tells the monitoring system
# WHERE to look for product changes and which programs to check.
#
# Adding a source = adding a block below. No skill editing needed.
# Adding a program = adding a block + creating a modules/ folder +
#                    running: python3 sync.py --write
#
# Skills read this file at runtime.
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# SLACK CHANNELS — scanned for product updates
# ───────────────────────────────────────────────────────────────
slack_channels:

  - id: product-updates
    name: "#product-updates"
    channel_id: C08SPKCGZQ8
    purpose: "Primary source for all Postman product releases"
    scan_frequency: daily          # daily | weekly | monthly
    lookback_days: 7               # how many days back to read
    feature_domains:               # which feature areas this channel covers
      - all                        # "all" = covers every domain
    notes: >
      The canonical product changelog channel. Every shipped feature
      gets posted here with stage, plan tiers, and demo links.

  # ── Add more Slack channels below ─────────────────────────────
  # Copy this block, fill in the channel_id, and you're done.
  #
  # - id: engineering-releases
  #   name: "#engineering-releases"
  #   channel_id: CXXXXXXXXXX
  #   purpose: "Engineering-specific releases and infrastructure changes"
  #   scan_frequency: weekly
  #   lookback_days: 7
  #   feature_domains:
  #     - CLI
  #     - CI/CD
  #     - infrastructure

# ───────────────────────────────────────────────────────────────
# PROGRAMS — which training programs exist and where their
#             module files live. Skills scan ALL programs listed here.
#
# The sync script (sync.py) reads this to generate the hub's
# CLASSES data array. Teammates see the hub — they never touch
# these files. You maintain the .md files; sync.py updates the hub.
# ───────────────────────────────────────────────────────────────
programs:

  - id: bootcamp
    name: "Fundamentals Bootcamp"
    description: "12-module new-hire onboarding program"
    module_dir: "modules/bootcamp/"
    module_prefix: "M"            # Module IDs start with M01, M02...
    active: true
    drive_sources:                 # Google Drive docs the review skill
                                   # can read to verify actual content
      - id: "1NpnHUJy2_6C_jarRMmEitHi_KAdGz3YdtZOyK64ExOU"
        name: "Postman V12 Fundamentals (Slides)"
        type: presentation
      - id: "1GFnZXgZZhTFRVn5UnHvhCvkz_zQGgYDbGc9ZyHsdqts"
