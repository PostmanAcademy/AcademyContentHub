# ───────────────────────────────────────────────────────────────
# REFERENCE DOCS — links for humans, not scanned automatically
# These are design rationale and source materials. Link them here
# so they appear in the hub's Settings page.
# ───────────────────────────────────────────────────────────────
reference_docs:

  - name: "V11 Bootcamp Flow"
    url: "https://docs.google.com/document/d/1D7o7IYvkrQm2FeCgbh7SisnzF4Xlbc6pA1QJInGh-y4/edit"
    purpose: "Original facilitator flow"

  - name: "Bootcamp Review & Analysis"
    url: "https://docs.google.com/document/d/1D14mLqe-BIz3dseLtvF9IVgUClZmfCICfFERnfStnog/edit"
    purpose: "Analysis of what needed restructuring"

  - name: "New Hire Bootcamp Refresh Guide"
    url: "https://docs.google.com/document/d/1Uo1oHwETRLwxCRA40Hc1am5toD1TrI3QmUQSuCZ7Y_8/edit"
    purpose: "Digital Grocery Store hands-on modules"

  - name: "Postman V12 Wiki"
    url: "https://postmanlabs.atlassian.net/wiki/spaces/v12/pages/7131791735/Postman+v12"
    purpose: "Internal V12 product documentation (Confluence)"

# ───────────────────────────────────────────────────────────────
# COVERAGE GAP DETECTION — the safety net
# ───────────────────────────────────────────────────────────────
coverage_settings:
  # When a product update mentions a feature that NO module in ANY
  # program lists in its postman_features frontmatter, flag it in
  # the Product Update Review document.
  notify_on_gap: true              # include gap warnings in reviews
  alert_threshold: 3               # number of uncovered features
                                    # before highlighting in review
